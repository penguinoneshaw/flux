apiVersion: v1
kind: Namespace
metadata:
  name: castsponsorskip
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: castsponsorskip
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: castsponsorskip
  template:
    metadata:
      labels:
        app: castsponsorskip
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
      containers:
        - name: castsponsorskip
          image: ghcr.io/gabe565/castsponsorskip:latest
          env:
            - name: TZ
              value: "Europe/London"
            - name: CSS_YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: config-secrets
                  key: youtube_api_key
            - name: CSS_CATEGORIES
              value: "sponsor,interaction,preview"
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          securityContext:
            readOnlyRootFilesystem: true
